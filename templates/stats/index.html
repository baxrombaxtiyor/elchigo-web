{% extends 'base.html' %}
{% block title %}Статистика{% endblock %}
{% block page_title %}Статистика{% endblock %}
{% block extra_css %}
<style>
.period-tabs{display:flex;gap:4px;background:#fff;padding:4px;border-radius:10px;margin-bottom:24px;width:fit-content}
.ptab{padding:8px 20px;border-radius:7px;font-family:'Barlow',sans-serif;font-weight:700;font-size:14px;cursor:pointer;border:none;background:transparent;color:#888;transition:all .15s}
.ptab.active{background:#8B0000;color:#fff}
.chart-bar{display:flex;align-items:flex-end;gap:6px;height:160px}
.bar-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar{background:#8B0000;border-radius:4px 4px 0 0;width:100%;transition:height .4s}
.bar-label{font-size:10px;color:#888}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
</style>
{% endblock %}
{% block content %}
<div class="period-tabs">
  <button class="ptab active" onclick="load('today',this)">Сегодня</button>
  <button class="ptab" onclick="load('week',this)">Неделя</button>
  <button class="ptab" onclick="load('month',this)">Месяц</button>
</div>

<div class="stat-grid" style="margin-bottom:24px">
  <div class="stat-card primary" id="s-revenue">
    <div class="stat-icon" style="background:rgba(255,255,255,.1)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 100 7h5a3.5 3.5 0 110 7H6"/></svg>
    </div>
    <div><div class="stat-label">Выручка</div><div class="stat-value" id="v-revenue">—</div></div>
  </div>
</div>

<div class="grid-2">
  <div class="card">
    <div class="card-header"><span class="card-title">График выручки</span></div>
    <div class="card-body"><div class="chart-bar" id="chart">Загрузка...</div></div>
  </div>
  <div class="card">
    <div class="card-header"><span class="card-title">Топ блюда</span></div>
    <div class="card-body" id="top-dishes">Загрузка...</div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
async function load(period, el){
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
  if(el) el.classList.add('active');
  const r = await fetch(`/stats/api/?period=${period}`);
  const d = await r.json();

  document.getElementById('v-revenue').textContent =
    Number(d.total_revenue).toLocaleString('ru') + ' сум';

  const chart = document.getElementById('chart');
  const days = Object.keys(d.daily);
  if(!days.length){ chart.innerHTML='<div style="color:#888;font-size:13px">Нет данных</div>'; }
  else {
    const max = Math.max(...Object.values(d.daily));
    chart.innerHTML = days.map(day=>{
      const h = max>0 ? Math.max(6,(d.daily[day]/max)*150) : 6;
      const val = d.daily[day]>=1000 ? (d.daily[day]/1000).toFixed(0)+'K' : d.daily[day];
      return `<div class="bar-wrap">
        <div style="font-size:10px;color:#888">${val}</div>
        <div class="bar" style="height:${h}px"></div>
        <div class="bar-label">${day}</div>
      </div>`;
    }).join('');
  }

  const td = document.getElementById('top-dishes');
  if(!d.top_dishes.length){ td.innerHTML='<div style="color:#888;font-size:13px">Нет данных</div>'; return; }
  const maxC = d.top_dishes[0].count;
  td.innerHTML = d.top_dishes.map((dish,i)=>`
    <div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px">
        <span style="font-size:13px;font-weight:600">${['🥇','🥈','🥉','4.','5.'][i]} ${dish.name}</span>
        <span style="font-size:12px;color:#888">${dish.count} шт</span>
      </div>
      <div style="background:#E5E5E5;border-radius:4px;height:5px">
        <div style="background:#8B0000;height:5px;border-radius:4px;width:${(dish.count/maxC*100).toFixed(0)}%"></div>
      </div>
    </div>`).join('');
}
load('week');
</script>
{% endblock %}
